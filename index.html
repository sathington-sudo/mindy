<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Hands Mindy | Hamilton VIP</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out',
                        'pulse-slow': 'pulseSlow 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseSlow: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.7' },
                        }
                    },
                    boxShadow: {
                        'glow-gold': '0 0 40px rgba(212,175,55,0.4)',
                        'glow-red': '0 0 40px rgba(139,0,0,0.5)',
                    }
                }
            }
        }
    </script>

    <!-- React + Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #4b1d0f; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8b0000; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .section-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65), rgba(10,0,0,0.85));
            z-index: 0;
        }
        .section-content { position: relative; z-index: 1; }
    </style>
</head>
<body class="bg-black text-neutral-100 antialiased selection:bg-red-900 selection:text-amber-200">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons (kept yours)
        const Icon = ({ path, className = "", size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );
        const Shield = (p) => <Icon {...p} path={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>} />;
        const Clock = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
        const AlertTriangle = (p) => <Icon {...p} path={<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
        const CheckCircle = (p) => <Icon {...p} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
        const Camera = (p) => <Icon {...p} path={<><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>} />;
        const Lock = (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />;
        const Calendar = (p) => <Icon {...p} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />;
        const Menu = (p) => <Icon {...p} path={<><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></>} />;
        const X = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const ChevronDown = (p) => <Icon {...p} path={<><polyline points="6 9 12 15 18 9"/></>} />;

        const Website = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToSection = (id) => {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
                setIsMobileMenuOpen(false);
            };

            return (
                <div className="relative">
                    {/* Urgency Bar */}
                    <div className="fixed top-0 left-0 right-0 z-[60] bg-gradient-to-r from-red-950 via-red-900 to-amber-950 text-amber-200 text-xs md:text-sm font-bold text-center py-2.5 px-4 uppercase tracking-widest border-b border-red-800/50 flex justify-center items-center gap-3 shadow-lg">
                        <Calendar className="w-5 h-5" />
                        <span>Limited Spots Before I Leave West — Book Now</span>

                    {/* Navigation */}

                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-gradient-to-br from-red-800 to-amber-700 rounded-full flex items-center justify-center text-white font-serif text-2xl font-bold shadow-xl shadow-red-950/50">
                                    M
                                </div>
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-serif tracking-wider text-amber-300">MAGIC HANDS MINDY</h1>
                                    <p className="text-[11px] md:text-xs text-amber-500 uppercase tracking-[0.3em]">Hamilton VIP Sensual Escape</p>
                                </div>
                            </div>

                            {/* Desktop */}
                            <div className="hidden md:flex items-center gap-10">
                                {['About', 'Services', 'Gallery', 'Screening'].map(item => (
                                    <button
                                        key={item}
                                        onClick={() => scrollToSection(item.toLowerCase())}
                                        className="text-sm uppercase tracking-widest text-neutral-300 hover:text-amber-300 transition-colors"
                                    >
                                        {item}
                                    </button>
                                ))}
                                <button
                                    onClick={() => scrollToSection('screening')}
                                    className="px-8 py-3 bg-gradient-to-r from-red-800 to-amber-700 hover:from-red-700 hover:to-amber-600 text-white text-sm font-bold uppercase tracking-widest rounded-full shadow-xl shadow-red-950/50 transition-all transform hover:scale-105"
                                >
                                    Book Now
                                </button>
                            </div>

                            {/* Mobile Menu Btn */}
                            <button className="md:hidden text-amber-300 p-2" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                            </button>
                        </div>

                        {/* Mobile Dropdown */}
                        {isMobileMenuOpen && (
                            <div className="md:hidden bg-black/95 border-t border-red-950/50 py-6 flex flex-col items-center gap-6 animate-fade-in">
                                {['About', 'Services', 'Gallery', 'Screening'].map(item => (
                                    <button
                                        key={item}
                                        onClick={() => scrollToSection(item.toLowerCase())}
                                        className="text-lg uppercase tracking-widest text-neutral-200 hover:text-amber-300 transition-colors"
                                    >
                                        {item}
                                    </button>
                                ))}
                            </div>
                        )}
                    </nav>

                    {/* Hero */}
                    <section className="relative min-h-screen flex items-center justify-center bg-cover bg-center bg-fixed pt-32 md:pt-24">
                        <div className="absolute inset-0 z-0">
                            <img
                                src="https://images.unsplash.com/photo-1604004555482-2d3e4a0f3e8e?q=80&w=2070&auto=format&fit=crop"
                                alt="Sensual background"
                                className="w-full h-full object-cover opacity-40"
                            />
                            <div className="absolute inset-0 bg-gradient-to-b from-black/60 via-black/85 to-black section-bg" />
                        </div>
                        <div className="relative z-10 container mx-auto px-6 text-center section-content">
                            <div className="inline-flex items-center gap-3 px-6 py-2.5 bg-red-950/50 border border-red-800/50 rounded-full text-amber-300 text-sm uppercase tracking-[0.3em] mb-8 backdrop-blur-md animate-pulse-slow">
                                <span className="w-3 h-3 bg-amber-400 rounded-full animate-ping"></span>
                                Limited Spots – Book Before I Leave
                            </div>
                            <h1 className="text-6xl md:text-8xl lg:text-9xl font-serif italic text-white mb-6 tracking-tight drop-shadow-2xl">
                                Magic Hands <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-red-400">Mindy</span>
                            </h1>
                            <p className="text-xl md:text-3xl text-amber-200 font-light mb-10 max-w-3xl mx-auto">
                                Irish curves • Sensual massage • Body slide • Squirt shows • Exotic showers • Unrushed pleasure
                            </p>
                            <div className="flex flex-col sm:flex-row justify-center gap-6">
                                <button onClick={() => scrollToSection('screening')} className="px-12 py-6 bg-gradient-to-r from-red-800 to-amber-700 hover:from-red-700 hover:to-amber-600 text-white font-bold text-lg uppercase tracking-widest rounded-2xl shadow-2xl shadow-red-950/70 transform hover:scale-105 transition-all">
                                    Start Screening
                                </button>
                                <button onClick={() => scrollToSection('gallery')} className="px-12 py-6 bg-black/40 border border-amber-500/30 hover:bg-amber-900/30 text-amber-300 font-bold text-lg uppercase tracking-widest rounded-2xl backdrop-blur-md transition-all">
                                    View Gallery
                                </button>
                            </div>
                        </div>
                        <div className="absolute bottom-12 left-1/2 -translate-x-1/2 animate-bounce text-amber-400 opacity-70">
                            <ChevronDown size={32} />
                        </div>
                    </section>

                    {/* About */}
                    <section id="about" className="relative py-24 px-6 bg-cover bg-center">
                        <div className="absolute inset-0 bg-black/90 section-bg"></div>
                        <div className="relative z-10 container mx-auto max-w-5xl">
                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <div className="space-y-8">
                                    <h2 className="text-amber-400 uppercase tracking-[0.3em] text-sm font-bold">About Mindy</h2>
                                    <h3 className="text-5xl font-serif text-white">Your Private Hamilton Fantasy</h3>
                                    <p className="text-lg text-neutral-300 leading-relaxed">
                                        Wild Irish woman, 5'1", long red hair, piercing blue eyes, 36C-28-36 curves. 
                                        100% independent, legal, safe, discreet. No bots, no games — just real, honest pleasure.
                                    </p>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="bg-black/50 backdrop-blur p-6 rounded-2xl border border-red-900/30">
                                            <span className="block text-amber-400 text-sm">Age</span>
                                            <span className="text-3xl font-serif">51 (Sexy)</span>
                                        </div>
                                        <div className="bg-black/50 backdrop-blur p-6 rounded-2xl border border-red-900/30">
                                            <span className="block text-amber-400 text-sm">Hair / Eyes</span>
                                            <span className="text-3xl font-serif">Red / Blue</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-black/60 backdrop-blur-2xl border border-red-900/40 rounded-3xl p-10 shadow-2xl">
                                    <h4 className="text-xl text-white mb-6 flex items-center gap-3">
                                        <AlertTriangle className="text-red-500" size={20} />
                                        House Rules
                                    </h4>
                                    <ul className="space-y-4 text-neutral-300">
                                        <li className="flex items-start gap-3"><div className="mt-1.5 w-2 h-2 bg-red-600 rounded-full flex-shrink-0"></div>NO under 25 (ID checked)</li>
                                        <li className="flex items-start gap-3"><div className="mt-1.5 w-2 h-2 bg-red-600 rounded-full flex-shrink-0"></div>NO blocked/private calls</li>
                                        <li className="flex items-start gap-3"><div className="mt-1.5 w-2 h-2 bg-red-600 rounded-full flex-shrink-0"></div>NO drugs, alcohol, diseases</li>
                                        <li className="flex items-start gap-3"><div className="mt-1.5 w-2 h-2 bg-red-600 rounded-full flex-shrink-0"></div>Respect mandatory</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Services */}
                    <section id="services" className="relative py-24 px-6 bg-cover bg-center" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1519741497674-8d3e4e0d3e5f?q=80&w=2070&auto=format&fit=crop')" }}>
                        <div className="absolute inset-0 bg-black/90 section-bg"></div>
                        <div className="relative z-10 container mx-auto">
                            <div className="text-center mb-16">
                                <h2 className="text-amber-400 uppercase tracking-[0.3em] text-sm font-bold mb-4">My Menu</h2>
                                <h3 className="text-6xl font-serif text-white">Sensual Offerings</h3>
                            </div>
                            <div className="grid md:grid-cols-3 gap-8 max-w-6xl mx-auto">
                                {/* Cards */}
                                {[
                                    { title: "100hh Massage Special", price: "$100", features: ["Hot oil", "Full attention", "Shower available"] },
                                    { title: "Body Slide + Shower", price: "+$50", features: ["Slippery wet play", "Exotic fun", "No rush"] },
                                    { title: "Squirt Show", price: "Ask", features: ["Private performance", "Intense finish", "Toys welcome"] },
                                ].map((item, i) => (
                                    <div key={i} className="group bg-black/60 backdrop-blur-xl border border-red-950/50 rounded-3xl p-10 hover:border-amber-500/60 hover:shadow-glow-gold transition-all duration-300">
                                        <h4 className="text-3xl font-serif text-amber-300 mb-6">{item.title}</h4>
                                        <div className="text-5xl font-bold text-white mb-6 group-hover:text-amber-400 transition-colors">${item.price}</div>
                                        <ul className="space-y-3 text-neutral-300">
                                            {item.features.map(f => <li key={f} className="flex items-center gap-3"><CheckCircle className="text-amber-500" size={16} /> {f}</li>)}
                                        </ul>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Gallery */}
                    <section id="gallery" className="relative py-24 px-6 bg-black">
                        <div className="container mx-auto">
                            <div className="text-center mb-16">
                                <h2 className="text-amber-400 uppercase tracking-[0.3em] text-sm font-bold mb-4">Real Gallery</h2>
                                <h3 className="text-6xl font-serif text-white">100% Verified</h3>
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                {[1,2,3,4,5,6,7,8].map(i => (
                                    <div key={i} className="group relative aspect-[3/4] rounded-3xl overflow-hidden shadow-2xl">
                                        <img
                                            src={`https://picsum.photos/id/${200+i}/800/1200`}
                                            alt="Mindy"
                                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                        />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                                            <div className="absolute bottom-6 left-6 bg-black/60 backdrop-blur px-4 py-2 rounded-full text-xs text-amber-300">
                                                Teaser {i}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <p className="text-center mt-12 text-neutral-500 italic">
                                Full uncensored gallery available after screening
                            </p>
                        </div>
                    </section>

                    {/* Screening / Booking */}
                    <section id="screening" className="relative py-24 px-6 bg-cover bg-center" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1604004555482-2d3e4a0f3e8e?q=80&w=2070&auto=format&fit=crop')" }}>
                        <div className="absolute inset-0 bg-black/90 section-bg"></div>
                        <div className="relative z-10 container mx-auto max-w-3xl">
                            <div className="bg-black/70 backdrop-blur-2xl border border-red-900/40 rounded-3xl p-12 shadow-2xl">
                                <h2 className="text-5xl font-serif text-center text-amber-300 mb-8">Secure Screening</h2>
                                <p className="text-center text-neutral-400 mb-12">
                                    To keep everything safe and private, please complete this quick form.
                                </p>
                                {/* Your existing BookingForm component here */}
                                {/* ... paste your BookingForm code ... */}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-black py-12 border-t border-red-950/30 text-center">
                        <div className="container mx-auto px-6">
                            <h2 className="text-3xl font-serif text-amber-400 mb-6">Magic Hands Mindy</h2>
                            <p className="text-neutral-500 text-sm">
                                Hamilton, Ontario • Independent Provider • 18+ Only<br/>
                                © {new Date().getFullYear()} • Designed Locally
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Website />);
    </script>
</body>
</html>
